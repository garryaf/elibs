# ============================================================================
# eLIS — Docker Compose (Dev + Production)
# Usage: docker compose up -d
# Production: Set env vars (DOMAIN, JWT_SECRET, etc.) then docker compose up -d --build
# Access: https://elibs.jizo.my.id (prod) | http://localhost:3000 (dev)
# ============================================================================

services:
  # --- Reverse Proxy (Nginx + SSL) ---
  nginx:
    image: nginx:alpine
    container_name: elis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/active.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - elis-network

  certbot:
    image: certbot/certbot
    container_name: elis-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - elis-network

  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: elis-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-elis_db}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - elis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-elis_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elis-network

  redis:
    image: redis:7-alpine
    container_name: elis-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - elis_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elis-network

  # --- Application ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      cache_from:
        - type=local,src=/tmp/.buildx-cache-api
      cache_to:
        - type=local,dest=/tmp/.buildx-cache-api,mode=max
    container_name: elis-api
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - ./deploy/env/.env.local
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-elis_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-elis-local-development-secret-key-minimum-32-characters}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-https://elibs.jizo.my.id,http://localhost:3000,http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - elis-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      cache_from:
        - type=local,src=/tmp/.buildx-cache-web
      cache_to:
        - type=local,dest=/tmp/.buildx-cache-web,mode=max
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: elis-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - elis-network

volumes:
  elis_pgdata:
    driver: local
  elis_redis:
    driver: local

networks:
  elis-network:
    driver: bridge
