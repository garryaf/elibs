# ============================================================================
# eLIS — CI/CD Pipeline: Build on GitHub Actions → Deploy to VPS
# 
# Trigger: Push to main branch
# Strategy: Build artifacts on GitHub (7 GB RAM), deploy to VPS via SSH
# No Docker build on VPS — only infra (postgres/redis/nginx) runs in Docker
# ============================================================================

name: Build & Deploy to VPS

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # --- Build API ---
      - name: Install API dependencies
        run: npm ci --workspace=api --include-workspace-root

      - name: Generate Prisma Client
        working-directory: apps/api
        run: npx prisma generate

      - name: Build API (NestJS)
        working-directory: apps/api
        run: npx nest build

      - name: Build Seed Scripts
        working-directory: apps/api/prisma/seeds
        run: npx tsc --project tsconfig.seed.json

      # --- Build Web ---
      - name: Install Web dependencies
        run: npm ci --workspace=web --include-workspace-root

      - name: Build Web (Next.js)
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      # --- Package artifacts ---
      - name: Package API artifact
        run: |
          tar -czf elis-api.tar.gz \
            apps/api/dist \
            apps/api/prisma \
            apps/api/package.json \
            apps/api/docker-entrypoint.sh \
            package.json \
            package-lock.json

      - name: Package Web artifact
        run: |
          tar -czf elis-web.tar.gz \
            apps/web/.next \
            apps/web/public \
            apps/web/package.json \
            apps/web/next.config.ts \
            package.json \
            package-lock.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elis-build
          path: |
            elis-api.tar.gz
            elis-web.tar.gz
          retention-days: 3

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: elis-build

      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.196.155.147
          username: dinaragil
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "elis-api.tar.gz,elis-web.tar.gz"
          target: "/tmp/elis-deploy"

      - name: Execute deploy script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.196.155.147
          username: dinaragil
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== eLIS Deploy Start ==="
            
            APP_DIR="/home/dinaragil/elibs"
            DEPLOY_DIR="/tmp/elis-deploy"
            
            # Extract artifacts
            cd $APP_DIR
            tar -xzf $DEPLOY_DIR/elis-api.tar.gz
            tar -xzf $DEPLOY_DIR/elis-web.tar.gz
            
            # Install production dependencies (lightweight, no build needed)
            npm ci --workspace=api --include-workspace-root --omit=dev
            npm ci --workspace=web --include-workspace-root --omit=dev
            
            # Copy Prisma client to correct location
            cd apps/api && npx prisma generate && cd ../..
            
            # Run database migrations
            cd apps/api
            npx prisma migrate deploy
            cd ../..
            
            # Run seed (idempotent)
            cd apps/api
            if [ -f "prisma/seeds/dist/index.js" ]; then
              node prisma/seeds/dist/index.js || echo "[seed] Warning: non-fatal"
            fi
            cd ../..
            
            # Restart applications via PM2
            pm2 restart elis-ecosystem.config.js --update-env
            
            # Cleanup
            rm -rf $DEPLOY_DIR
            
            echo "=== eLIS Deploy Complete ==="
            pm2 status
