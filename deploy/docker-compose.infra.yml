# ============================================================================
# eLIS — Infrastructure Only (PostgreSQL, Redis, Nginx, Certbot)
# 
# Usage on VPS: docker compose -f deploy/docker-compose.infra.yml up -d
# 
# Application (API + Web) runs natively via PM2, NOT in Docker.
# This eliminates the heavy multi-stage build on VPS.
# ============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: elis-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-elis_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - elis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-elis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - elis-infra

  redis:
    image: redis:7-alpine
    container_name: elis-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - elis_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - elis-infra

  nginx:
    image: nginx:alpine
    container_name: elis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    restart: unless-stopped
    # host.docker.internal resolves to host IP so nginx can reach PM2 apps
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - elis-infra

  certbot:
    image: certbot/certbot
    container_name: elis-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - elis-infra

volumes:
  elis_pgdata:
    driver: local
  elis_redis:
    driver: local

networks:
  elis-infra:
    driver: bridge
