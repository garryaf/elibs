# Initial config — HTTP only (used before SSL cert exists)
# After certbot issues certs, replace active.conf with the full SSL version

server {
    listen 80;
    server_name elibs.jizo.my.id;

    # Docker embedded DNS resolver — re-resolves upstream on each request
    # Prevents stale IP cache after container recreation
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API reverse proxy (HTTP for initial setup)
    location /api/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend reverse proxy (HTTP for initial setup)
    location / {
        set $upstream_web web;
        proxy_pass http://$upstream_web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
